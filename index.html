<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Aquarium - Dashboard</title>
    <!-- 1. LIBRERÍAS DE FIREBASE (Versión Estable) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #1c2128; --accent: #38bdf8; --text: #f0f6fc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .val { font-size: 2rem; font-weight: bold; color: var(--accent); }
        #status { text-align: right; color: #3fb950; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status">● Conectando a Firebase...</div>
    <h2 style="margin-bottom: 20px;"><i class="fas fa-fish"></i> Nexus Aquarium</h2>

    <div class="grid">
        <div class="card">
            <h3>TEMPERATURA</h3>
            <div class="val" id="txt-temp">--°C</div>
        </div>
        <div class="card">
            <h3>PH</h3>
            <div class="val" id="txt-ph">--</div>
        </div>
        <div class="card">
            <h3>TDS</h3>
            <div class="val" id="txt-tds">-- ppm</div>
        </div>
    </div>

    <script>
        // 2. TU CONFIGURACIÓN (Verificada de tu imagen)
        const firebaseConfig = {
            databaseURL: "https://acuario-3ea31-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 3. EL CÓDIGO DE LECTURA (Lo que me preguntaste dónde poner)
        db.ref('monitoreo').on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("Datos recibidos:", data); // Esto se ve en la consola (F12)

            if (data) {
                // Actualizamos los textos con los datos de tu imagen (temp, ph, tds)
                document.getElementById('txt-temp').innerText = data.temp + "°C";
                document.getElementById('txt-ph').innerText = data.ph;
                document.getElementById('txt-tds').innerText = data.tds + " ppm";
                document.getElementById('status').innerText = "● SISTEMA ONLINE";
            } else {
                document.getElementById('status').innerText = "○ No hay datos en 'monitoreo'";
            }
        }, (error) => {
            console.error("Error de Firebase:", error);
            document.getElementById('status').innerText = "Error de Permisos";
        });
    </script>
</body>
</html>
