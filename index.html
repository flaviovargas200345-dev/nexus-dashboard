<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Aquarium Pro - Dashboard</title>
    <!-- Librerías Necesarias -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #161b22; --card-bg: #1c2128; --accent: #38bdf8; --text-gray: #8b949e; --text-white: #f0f6fc; --alert-red: #ef4444; }
        body { background-color: var(--bg-dark); color: var(--text-white); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--sidebar-bg); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; }
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header-top { padding: 15px 30px; background: var(--sidebar-bg); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .content-padding { padding: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .val { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 25px; }
        #status-text { font-size: 0.8rem; color: #4ade80; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent)"><i class="fas fa-cube"></i> Nexus</h2>
    <div style="color:var(--text-gray); margin-top:20px;">DASHBOARD</div>
</div>

<div class="main-container">
    <header class="header-top">
        <div>Reef Tank #1</div>
        <div id="status-text">● Conectando a la nube...</div>
    </header>

    <div class="content-padding">
        <div class="stats-grid">
            <div class="stat-card"><h3>TEMP</h3><div class="val" id="txt-temp">--°C</div></div>
            <div class="stat-card"><h3>PH</h3><div class="val" id="txt-ph">--</div></div>
            <div class="stat-card"><h3>TDS</h3><div class="val" id="txt-tds">-- ppm</div></div>
            <div class="stat-card"><h3>TURBIDEZ</h3><div class="val">28 NTU</div></div>
            <div class="stat-card"><h3>OXIGENO</h3><div class="val">7.5 mg/L</div></div>
        </div>

        <div class="chart-box">
            <h4>Live Parameter Tracking</h4>
            <canvas id="liveChart" height="100"></canvas>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- GRÁFICA ---
    const ctx = document.getElementById('liveChart').getContext('2d');
    const liveChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#38bdf8', tension: 0.4 }] }
    });

    // --- ESCUCHAR DATOS (LA CLAVE) ---
    db.ref('monitoreo').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('txt-temp').innerText = data.temp + "°C";
            document.getElementById('txt-ph').innerText = data.ph;
            document.getElementById('txt-tds').innerText = data.tds + " ppm";
            document.getElementById('status-text').innerText = "● SISTEMA ONLINE";

            // Gráfica
            const time = new Date().toLocaleTimeString();
            if(liveChart.data.labels.length > 10) { liveChart.data.labels.shift(); liveChart.data.datasets[0].data.shift(); }
            liveChart.data.labels.push(time);
            liveChart.data.datasets[0].data.push(data.temp);
            liveChart.update();
        }
    }, (error) => {
        document.getElementById('status-text').innerText = "● Error: " + error.message;
    });
</script>
</body>
</html>

</html>
